name: 🐛 Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the form below to help us understand and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Detailed steps to reproduce the issue
      placeholder: |
        1. Install package with '...'
        2. Configure environment variables '...'
        3. Upload PDF document '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen
      placeholder: The document should be parsed successfully...
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened
      placeholder: The parser throws an error...
    validations:
      required: true

  - type: dropdown
    id: package
    attributes:
      label: Package
      description: Which package is affected?
      options:
        - pgx-docling-parser-serve
        - pgx-docling-parser-local
        - pgx-docling-parser-core
        - Not sure
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Package Version
      description: What version of the package are you using?
      placeholder: e.g., 0.1.0
    validations:
      required: true

  - type: dropdown
    id: conversion_mode
    attributes:
      label: PDF Conversion Mode
      description: Which conversion mode are you using?
      options:
        - easyocr
        - tesseract
        - granite_docling
        - Not applicable
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: Environment Details
      description: Please provide details about your environment
      placeholder: |
        - OS: [e.g., Ubuntu 22.04, macOS 14.0, Windows 11]
        - Python version: [e.g., 3.12.0]
        - Docker version: [e.g., 24.0.0] (if applicable)
        - Paperless-ngx version: [e.g., 2.5.0]
        - Docling-Serve version: [e.g., latest] (if using docling_serve package)
      render: markdown
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Please paste any relevant log output or error messages
      placeholder: Paste logs here...
      render: shell
    validations:
      required: false

  - type: textarea
    id: config
    attributes:
      label: Configuration
      description: Relevant environment variables or configuration (remove sensitive data)
      placeholder: |
        PAPERLESS_DOCLING_SERVE_URL=http://localhost:5000
        PAPERLESS_DOCLING_PDF_CONVERSION_MODE=easyocr
        PAPERLESS_DOCLING_SERVE_TIMEOUT=300.0
      render: shell
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context about the problem here (screenshots, sample files, etc.)
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission Checklist
      description: Please confirm the following before submitting
      options:
        - label: I have searched existing issues to ensure this is not a duplicate
          required: true
        - label: I have provided all required information above
          required: true
        - label: I am using the latest version of the package
          required: false