name: Create Version Tag

on:
  pull_request:
    types: [closed]
    branches:
      - main

jobs:
  create-tag:
    name: Create version tag from PR
    # Only run on PR merge
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    environment:
      name: production
    permissions:
      contents: write
      pull-requests: write
      actions: write  # Required to trigger other workflows
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history needed for version calculation
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Validate version labels
        id: validate
        env:
          PR_LABELS: ${{ toJson(github.event.pull_request.labels.*.name) }}
        run: |
          echo "PR Labels: $PR_LABELS"
          
          # Count version labels
          MAJOR_COUNT=$(echo "$PR_LABELS" | grep -o "version:major" | wc -l)
          MINOR_COUNT=$(echo "$PR_LABELS" | grep -o "version:minor" | wc -l)
          PATCH_COUNT=$(echo "$PR_LABELS" | grep -o "version:patch" | wc -l)
          
          TOTAL_VERSION_LABELS=$((MAJOR_COUNT + MINOR_COUNT + PATCH_COUNT))
          
          if [ $TOTAL_VERSION_LABELS -ne 1 ]; then
            echo "❌ ERROR: Expected exactly 1 version label, found $TOTAL_VERSION_LABELS"
            echo "This should have been caught by the validation workflow!"
            exit 1
          fi
          
          echo "✅ Validation passed: exactly one version label found"
      
      - name: Get latest tag
        id: get_latest_tag
        run: |
          # Get the latest tag, or use v0.0.0 if no tags exist
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT
          echo "Latest tag: $LATEST_TAG"
      
      - name: Determine version bump from PR labels
        id: version_bump
        env:
          PR_LABELS: ${{ toJson(github.event.pull_request.labels.*.name) }}
        run: |
          # Determine bump type from labels
          if echo "$PR_LABELS" | grep -q "version:major"; then
            BUMP_TYPE="major"
          elif echo "$PR_LABELS" | grep -q "version:minor"; then
            BUMP_TYPE="minor"
          elif echo "$PR_LABELS" | grep -q "version:patch"; then
            BUMP_TYPE="patch"
          else
            echo "❌ ERROR: No version label found (should not happen after validation)"
            exit 1
          fi
          
          echo "bump_type=$BUMP_TYPE" >> $GITHUB_OUTPUT
          echo "Version bump type: $BUMP_TYPE"
      
      - name: Calculate new version
        id: new_version
        run: |
          LATEST_TAG="${{ steps.get_latest_tag.outputs.latest_tag }}"
          BUMP_TYPE="${{ steps.version_bump.outputs.bump_type }}"
          
          # Remove 'v' prefix and split version
          VERSION=${LATEST_TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          
          # Increment based on bump type
          case $BUMP_TYPE in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac
          
          NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version: $NEW_VERSION (${BUMP_TYPE} bump from $LATEST_TAG)"
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Install Bob Shell
        run: curl -fsSL https://bob.ibm.com/download/bobshell.sh | bash -s -- --pm npm
      
      - name: Fetch git commit history
        id: fetch_commits
        run: |
          LATEST_TAG="${{ steps.get_latest_tag.outputs.latest_tag }}"
          NEW_VERSION="${{ steps.new_version.outputs.new_version }}"
          
          echo "Fetching commits from $LATEST_TAG to HEAD..."
          
          # Get commit log with format: hash | author | date | subject
          git log ${LATEST_TAG}..HEAD --pretty=format:"%H|%an|%ad|%s" --date=short > commits.log
          
          # Count commits
          COMMIT_COUNT=$(wc -l < commits.log)
          echo "Found $COMMIT_COUNT commits since $LATEST_TAG"
          
          # Also get full commit messages for context
          git log ${LATEST_TAG}..HEAD --pretty=format:"## Commit: %h%n**Author:** %an%n**Date:** %ad%n**Subject:** %s%n%n%b%n---" --date=short > commits_full.log
          
          echo "commit_count=$COMMIT_COUNT" >> $GITHUB_OUTPUT
      
      - name: Generate changelog with Bob
        env:
          BOBSHELL_API_KEY: ${{ secrets.BOBSHELL_API_KEY }}
        run: |
          bob --accept-license --auth-method api-key --approval-mode auto_edit -p "$(cat <<'EOF'
          You are generating a changelog for version ${{ steps.new_version.outputs.new_version }} of the ${{ github.repository }} repository, non-interactively, in CI.
          
          Read AGENTS.md first to understand this repo's patterns and constraints.
          
          The commit history since the last release (${{ steps.get_latest_tag.outputs.latest_tag }}) is in two files:
          - commits.log: Contains a summary of all commits (hash|author|date|subject)
          - commits_full.log: Contains full commit messages with bodies
          
          Read both files using the read_file tool.
          
          Then use the write_to_file tool to create a file named "changelog.md" with a well-structured changelog in valid Markdown format.
          
          The changelog.md file must contain:
          - A header: "# Release ${{ steps.new_version.outputs.new_version }}"
          - A subtitle with the release date and type: "*Released on $(date +%Y-%m-%d) - ${{ steps.version_bump.outputs.bump_type }} release*"
          - A horizontal rule: "---"
          - A "## 🎯 Summary" section with a 2-3 sentence overview of what changed in this release
          - A "## ✨ Features" section listing new features (if any)
          - A "## 🐛 Bug Fixes" section listing bug fixes (if any)
          - A "## 📚 Documentation" section listing documentation changes (if any)
          - A "## 🔧 Other Changes" section for other notable changes (if any)
          - Each item should reference the commit hash in parentheses, e.g., "- Added new feature (abc1234)"
          
          Guidelines:
          - Analyze commit messages to categorize changes appropriately
          - Look for keywords like "fix", "feat", "docs", "refactor", "test", "chore" in commit messages
          - Be concise but informative
          - Skip trivial commits like "fix typo" or "update README" unless they're significant
          - If a section has no items, omit that section entirely
          - Focus on user-facing changes and important technical improvements
          - The changelog should be professional and suitable for a GitHub release
          
          The entire changelog must be valid Markdown. Do not include any markers or delimiters.
          EOF
          )"
      
      - name: Check if tag already exists
        id: check_tag
        run: |
          NEW_VERSION="${{ steps.new_version.outputs.new_version }}"
          if git rev-parse "$NEW_VERSION" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "⚠️  Tag $NEW_VERSION already exists"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "✅ Tag $NEW_VERSION does not exist"
          fi
      - name: Create and push tag
        id: create_tag
        if: steps.check_tag.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEW_VERSION="${{ steps.new_version.outputs.new_version }}"
          BUMP_TYPE="${{ steps.version_bump.outputs.bump_type }}"
          PR_NUMBER="${{ github.event.pull_request.number }}"
          PR_TITLE="${{ github.event.pull_request.title }}"
          
          git config user.name "ibm-bob[bot]"
          git config user.email "ibm-bob[bot]@users.noreply.github.com"

          git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}
          
          # Create annotated tag with changelog as message
          if [ -f changelog.md ]; then
            echo "Using generated changelog for tag message"
            git tag -a "$NEW_VERSION" -F changelog.md
          else
            echo "⚠️  Changelog not found, using fallback message"
            git tag -a "$NEW_VERSION" -m "Release $NEW_VERSION (${BUMP_TYPE} bump) - PR #${PR_NUMBER}: ${PR_TITLE}"
          fi
          
          git push origin "$NEW_VERSION"
          
          echo "✅ Created and pushed tag: $NEW_VERSION"
          echo "tag_created=true" >> $GITHUB_OUTPUT
      
      - name: Trigger build and publish workflow
        if: steps.check_tag.outputs.exists == 'false' && steps.create_tag.outputs.tag_created == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEW_VERSION="${{ steps.new_version.outputs.new_version }}"
          
          echo "Triggering build-and-publish workflow for tag $NEW_VERSION..."
          
          gh workflow run build-and-publish.yml \
            --ref main \
            -f tag="$NEW_VERSION"
          
          echo "✅ Build workflow triggered successfully"
      
      - name: Comment on PR (tag created)
        if: steps.check_tag.outputs.exists == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const newVersion = '${{ steps.new_version.outputs.new_version }}';
            const bumpType = '${{ steps.version_bump.outputs.bump_type }}';
            
            github.rest.issues.createComment({
              issue_number: context.payload.pull_request.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🏷️ **Tag ${newVersion}** created successfully!\n\n- Version bump: ${bumpType}\n- Build and publish workflow will be triggered automatically`
            });
      
      - name: Comment on PR (tag already exists)
        if: steps.check_tag.outputs.exists == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const newVersion = '${{ steps.new_version.outputs.new_version }}';
            
            github.rest.issues.createComment({
              issue_number: context.payload.pull_request.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `⏭️ **Tag ${newVersion}** already exists - skipping tag creation.\n\nYou can manually trigger the build workflow if needed.`
            });

# Made with Bob