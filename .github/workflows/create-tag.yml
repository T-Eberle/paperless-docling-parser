name: Create Version Tag

on:
  pull_request:
    types: [closed]
    branches:
      - main

jobs:
  create-tag:
    name: Create version tag from PR
    # Only run on PR merge
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    environment:
      name: production
    permissions:
      contents: write
      pull-requests: write
      actions: write  # Required to trigger other workflows
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history needed for version calculation
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Validate version labels
        id: validate
        env:
          PR_LABELS: ${{ toJson(github.event.pull_request.labels.*.name) }}
        run: |
          echo "PR Labels: $PR_LABELS"
          
          # Count version labels
          MAJOR_COUNT=$(echo "$PR_LABELS" | grep -o "version:major" | wc -l)
          MINOR_COUNT=$(echo "$PR_LABELS" | grep -o "version:minor" | wc -l)
          PATCH_COUNT=$(echo "$PR_LABELS" | grep -o "version:patch" | wc -l)
          
          TOTAL_VERSION_LABELS=$((MAJOR_COUNT + MINOR_COUNT + PATCH_COUNT))
          
          if [ $TOTAL_VERSION_LABELS -ne 1 ]; then
            echo "❌ ERROR: Expected exactly 1 version label, found $TOTAL_VERSION_LABELS"
            echo "This should have been caught by the validation workflow!"
            exit 1
          fi
          
          echo "✅ Validation passed: exactly one version label found"
      
      - name: Get latest tag
        id: get_latest_tag
        run: |
          # Get the latest tag, or use v0.0.0 if no tags exist
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT
          echo "Latest tag: $LATEST_TAG"
      
      - name: Determine version bump from PR labels
        id: version_bump
        env:
          PR_LABELS: ${{ toJson(github.event.pull_request.labels.*.name) }}
        run: |
          # Determine bump type from labels
          if echo "$PR_LABELS" | grep -q "version:major"; then
            BUMP_TYPE="major"
          elif echo "$PR_LABELS" | grep -q "version:minor"; then
            BUMP_TYPE="minor"
          elif echo "$PR_LABELS" | grep -q "version:patch"; then
            BUMP_TYPE="patch"
          else
            echo "❌ ERROR: No version label found (should not happen after validation)"
            exit 1
          fi
          
          echo "bump_type=$BUMP_TYPE" >> $GITHUB_OUTPUT
          echo "Version bump type: $BUMP_TYPE"
      
      - name: Calculate new version
        id: new_version
        run: |
          LATEST_TAG="${{ steps.get_latest_tag.outputs.latest_tag }}"
          BUMP_TYPE="${{ steps.version_bump.outputs.bump_type }}"
          
          # Remove 'v' prefix and split version
          VERSION=${LATEST_TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          
          # Increment based on bump type
          case $BUMP_TYPE in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac
          
          NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version: $NEW_VERSION (${BUMP_TYPE} bump from $LATEST_TAG)"
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Install Bob Shell
        run: curl -fsSL https://bob.ibm.com/download/bobshell.sh | bash -s -- --pm npm
      
      - name: Generate changelog and create tag with Bob
        id: bob_tag
        env:
          BOBSHELL_API_KEY: ${{ secrets.BOBSHELL_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bob --accept-license --auth-method api-key --approval-mode auto_edit -p "$(cat <<'EOF'
          You are creating a version tag for ${{ steps.new_version.outputs.new_version }} of the ${{ github.repository }} repository, non-interactively, in CI.
          
          Your task is to:
          1. Fetch git commit history since the last release (${{ steps.get_latest_tag.outputs.latest_tag }})
          2. Generate a professional changelog
          3. Check if the tag already exists
          4. Create and push the tag with the changelog as the message (if it doesn't exist)
          
          ## Step 1: Fetch commit history
          Use execute_command to run:
          git log ${{ steps.get_latest_tag.outputs.latest_tag }}..HEAD --pretty=format:"%h|%an|%ad|%s" --date=short
          
          This will give you commits in format: short_hash|author|date|subject
          
          ## Step 2: Generate changelog
          Analyze the commit output and create a changelog.md file using write_to_file with this structure:
          
          ```markdown
          # Release ${{ steps.new_version.outputs.new_version }}
          *Released on $(date +%Y-%m-%d) - ${{ steps.version_bump.outputs.bump_type }} release*
          
          ---
          
          ## 🎯 Summary
          [2-3 sentence overview of what changed]
          
          ## ✨ Features
          - Feature description ([commit_hash](https://github.com/${{ github.repository }}/commit/commit_hash))
          
          ## 🐛 Bug Fixes
          - Fix description ([commit_hash](https://github.com/${{ github.repository }}/commit/commit_hash))
          
          ## 📚 Documentation
          - Doc change description ([commit_hash](https://github.com/${{ github.repository }}/commit/commit_hash))
          
          ## 🔧 Other Changes
          - Other change description ([commit_hash](https://github.com/${{ github.repository }}/commit/commit_hash))
          ```
          
          Guidelines for categorization:
          - Look for conventional commit prefixes: feat:, fix:, docs:, refactor:, test:, chore:, perf:, style:, build:, ci:
          - Skip trivial commits (typo fixes, merge commits, version bumps)
          - Omit sections with no items
          - Be concise but informative
          - Focus on user-facing changes
          
          ## Step 3: Check if tag exists
          Use execute_command to run:
          git rev-parse ${{ steps.new_version.outputs.new_version }} 2>/dev/null && echo "exists" || echo "not_exists"
          
          ## Step 4: Create and push tag (only if it doesn't exist)
          If the tag doesn't exist, use execute_command to run these commands:
          
          ```bash
          git config user.name "ibm-bob[bot]"
          git config user.email "ibm-bob[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}
          git tag -a "${{ steps.new_version.outputs.new_version }}" -F changelog.md
          git push origin "${{ steps.new_version.outputs.new_version }}"
          ```
          
          If the tag already exists, just report that and skip tag creation.
          
          ## Important Notes
          - Use execute_command for all git/gh operations
          - The GH_TOKEN environment variable is already set for authentication
          - After completing all steps, use attempt_completion to report the outcome
          - Include in your completion message whether the tag was created or already existed
          EOF
          )"
          
          # Capture Bob's exit code
          BOB_EXIT_CODE=$?
          
          if [ $BOB_EXIT_CODE -eq 0 ]; then
            echo "tag_created=true" >> $GITHUB_OUTPUT
            echo "✅ Bob completed successfully"
          else
            echo "tag_created=false" >> $GITHUB_OUTPUT
            echo "❌ Bob failed with exit code $BOB_EXIT_CODE"
            exit 1
          fi
      
      - name: Check if tag was created
        id: check_tag_created
        run: |
          NEW_VERSION="${{ steps.new_version.outputs.new_version }}"
          
          # Check if tag exists now (Bob should have created it)
          if git rev-parse "$NEW_VERSION" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "✅ Tag $NEW_VERSION exists"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "⚠️  Tag $NEW_VERSION was not created"
          fi
      
      - name: Trigger build and publish workflow
        if: steps.check_tag_created.outputs.exists == 'true' && steps.bob_tag.outputs.tag_created == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEW_VERSION="${{ steps.new_version.outputs.new_version }}"
          
          echo "Triggering build-and-publish workflow for tag $NEW_VERSION..."
          
          gh workflow run build-and-publish.yml \
            --ref main \
            -f tag="$NEW_VERSION"
          
          echo "✅ Build workflow triggered successfully"
      
      - name: Comment on PR (tag created)
        if: steps.check_tag_created.outputs.exists == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const newVersion = '${{ steps.new_version.outputs.new_version }}';
            const bumpType = '${{ steps.version_bump.outputs.bump_type }}';
            
            github.rest.issues.createComment({
              issue_number: context.payload.pull_request.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🏷️ **Tag ${newVersion}** created successfully!\n\n- Version bump: ${bumpType}\n- Build and publish workflow will be triggered automatically`
            });
      
      - name: Comment on PR (tag already exists)
        if: steps.check_tag_created.outputs.exists == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const newVersion = '${{ steps.new_version.outputs.new_version }}';
            
            github.rest.issues.createComment({
              issue_number: context.payload.pull_request.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `⏭️ **Tag ${newVersion}** already exists or was not created - skipping.\n\nYou can manually trigger the build workflow if needed.`
            });

# Made with Bob