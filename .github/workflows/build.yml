name: Build Packages

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch:

jobs:
  build:
    name: Build packages
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for version detection
      
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Build core package
        run: |
          cd packages/core
          uv build
      
      - name: Build docling-serve package
        run: |
          cd packages/docling_serve
          uv build
      
      - name: Build local package
        run: |
          cd packages/local
          uv build
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-packages
          path: |
            packages/core/dist/*
            packages/docling_serve/dist/*
            packages/local/dist/*
          retention-days: 7

