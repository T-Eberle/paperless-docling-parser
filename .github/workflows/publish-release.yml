name: Publish Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-and-publish:
    name: Build and Publish to PyPI
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://pypi.org/project/pgx-docling-parser-serve/
    permissions:
      contents: write  # For creating GitHub releases
      id-token: write  # For trusted publishing to PyPI (optional)
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for version detection
      
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Verify tag version
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          echo "Tag version: $TAG_VERSION"
          echo "TAG_VERSION=$TAG_VERSION" >> $GITHUB_ENV
      
      - name: Build core package
        run: |
          cd packages/core
          uv build
      
      - name: Build docling-serve package
        run: |
          cd packages/docling_serve
          uv build
      
      - name: Build local package
        run: |
          cd packages/local
          uv build
      
      - name: Publish core package to PyPI
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: |
          cd packages/core
          uv publish
      
      - name: Publish docling-serve package to PyPI
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: |
          cd packages/docling_serve
          uv publish
      
      - name: Publish local package to PyPI
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: |
          cd packages/local
          uv publish
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            packages/core/dist/*
            packages/docling_serve/dist/*
            packages/local/dist/*
          generate_release_notes: true
          draft: false
          prerelease: false

