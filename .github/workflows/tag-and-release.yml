name: Auto Tag and Publish Release

on:
  pull_request:
    types: [closed]
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build and publish (e.g., v1.0.0)'
        required: true
        type: string

jobs:
  create-tag:
    name: Create version tag from PR
    # Only run on PR merge, not on manual dispatch
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      new_version: ${{ steps.new_version.outputs.new_version }}
      bump_type: ${{ steps.version_bump.outputs.bump_type }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history needed for version calculation
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Validate version labels
        id: validate
        env:
          PR_LABELS: ${{ toJson(github.event.pull_request.labels.*.name) }}
        run: |
          echo "PR Labels: $PR_LABELS"
          
          # Count version labels
          MAJOR_COUNT=$(echo "$PR_LABELS" | grep -o "version:major" | wc -l)
          MINOR_COUNT=$(echo "$PR_LABELS" | grep -o "version:minor" | wc -l)
          PATCH_COUNT=$(echo "$PR_LABELS" | grep -o "version:patch" | wc -l)
          
          TOTAL_VERSION_LABELS=$((MAJOR_COUNT + MINOR_COUNT + PATCH_COUNT))
          
          if [ $TOTAL_VERSION_LABELS -ne 1 ]; then
            echo "❌ ERROR: Expected exactly 1 version label, found $TOTAL_VERSION_LABELS"
            echo "This should have been caught by the validation workflow!"
            exit 1
          fi
          
          echo "✅ Validation passed: exactly one version label found"
      
      - name: Get latest tag
        id: get_latest_tag
        run: |
          # Get the latest tag, or use v0.0.0 if no tags exist
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT
          echo "Latest tag: $LATEST_TAG"
      
      - name: Determine version bump from PR labels
        id: version_bump
        env:
          PR_LABELS: ${{ toJson(github.event.pull_request.labels.*.name) }}
        run: |
          # Determine bump type from labels
          if echo "$PR_LABELS" | grep -q "version:major"; then
            BUMP_TYPE="major"
          elif echo "$PR_LABELS" | grep -q "version:minor"; then
            BUMP_TYPE="minor"
          elif echo "$PR_LABELS" | grep -q "version:patch"; then
            BUMP_TYPE="patch"
          else
            echo "❌ ERROR: No version label found (should not happen after validation)"
            exit 1
          fi
          
          echo "bump_type=$BUMP_TYPE" >> $GITHUB_OUTPUT
          echo "Version bump type: $BUMP_TYPE"
      
      - name: Calculate new version
        id: new_version
        run: |
          LATEST_TAG="${{ steps.get_latest_tag.outputs.latest_tag }}"
          BUMP_TYPE="${{ steps.version_bump.outputs.bump_type }}"
          
          # Remove 'v' prefix and split version
          VERSION=${LATEST_TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          
          # Increment based on bump type
          case $BUMP_TYPE in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac
          
          NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version: $NEW_VERSION (${BUMP_TYPE} bump from $LATEST_TAG)"
      
      - name: Check if tag already exists
        id: check_tag
        run: |
          NEW_VERSION="${{ steps.new_version.outputs.new_version }}"
          if git rev-parse "$NEW_VERSION" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "⚠️  Tag $NEW_VERSION already exists"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "✅ Tag $NEW_VERSION does not exist"
          fi
      
      - name: Create and push tag
        id: create_tag
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          NEW_VERSION="${{ steps.new_version.outputs.new_version }}"
          BUMP_TYPE="${{ steps.version_bump.outputs.bump_type }}"
          PR_NUMBER="${{ github.event.pull_request.number }}"
          PR_TITLE="${{ github.event.pull_request.title }}"
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Create annotated tag with PR information
          git tag -a "$NEW_VERSION" -m "Release $NEW_VERSION (${BUMP_TYPE} bump) - PR #${PR_NUMBER}: ${PR_TITLE}"
          
          git push origin "$NEW_VERSION"
          
          echo "✅ Created and pushed tag: $NEW_VERSION"
      
      - name: Comment on PR (tag created)
        if: steps.check_tag.outputs.exists == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const newVersion = '${{ steps.new_version.outputs.new_version }}';
            const bumpType = '${{ steps.version_bump.outputs.bump_type }}';
            
            github.rest.issues.createComment({
              issue_number: context.payload.pull_request.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🏷️ **Tag ${newVersion}** created successfully!\n\n- Version bump: ${bumpType}\n- Build and publish job will run automatically`
            });
      
      - name: Comment on PR (tag already exists)
        if: steps.check_tag.outputs.exists == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const newVersion = '${{ steps.new_version.outputs.new_version }}';
            
            github.rest.issues.createComment({
              issue_number: context.payload.pull_request.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `⏭️ **Tag ${newVersion}** already exists - skipping tag creation.\n\nThe build and publish job will still run to ensure packages are published.`
            });
  
  build-and-publish:
    name: Build and publish packages to PyPI
    # Run after tag creation OR on manual dispatch
    # Only depend on create-tag when it actually runs (PR merge events)
    needs: [create-tag]
    if: |
      always() &&
      (github.event_name == 'workflow_dispatch' || needs.create-tag.result == 'success')
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://pypi.org/project/pgx-docling-parser-serve/
    permissions:
      contents: write
      pull-requests: write  # For commenting on PRs
      id-token: write  # For trusted publishing to PyPI (optional)
    
    steps:
      - name: Determine tag to build
        id: determine_tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Manual dispatch: use provided tag
            TAG="${{ inputs.tag }}"
            echo "Building from manual dispatch: $TAG"
          else
            # PR merge: use version calculated by create-tag job
            TAG="${{ needs.create-tag.outputs.new_version }}"
            echo "Building from PR merge: $TAG"
          fi
          
          if [ -z "$TAG" ]; then
            echo "❌ ERROR: Failed to determine tag"
            exit 1
          fi
          
          echo "tag=$TAG" >> $GITHUB_OUTPUT
      
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history needed for version calculation
          ref: ${{ steps.determine_tag.outputs.tag }}
      
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Verify version detection
        run: |
          TAG="${{ steps.determine_tag.outputs.tag }}"
          
          # Verify we're on the expected tag
          CURRENT_TAG=$(git describe --tags --exact-match 2>/dev/null || echo "")
          echo "Current tag: $CURRENT_TAG"
          
          if [ "$CURRENT_TAG" != "$TAG" ]; then
            echo "❌ ERROR: Not on expected tag! Expected $TAG but got $CURRENT_TAG"
            echo "Git status:"
            git status
            echo "Git tags:"
            git tag -l
            exit 1
          fi
          
          TAG_VERSION=${TAG#v}
          echo "✅ Version detection successful: $TAG_VERSION"
          echo "TAG_VERSION=$TAG_VERSION" >> $GITHUB_ENV
          
          # Debug git state for hatch-vcs
          echo "Git describe output: $(git describe --tags --long --dirty)"
          echo "Git HEAD: $(git rev-parse HEAD)"
          echo "Git tag list:"
          git tag -l --contains HEAD
      
      - name: Build core package
        run: |
          cd packages/core
          
          # Set version explicitly for hatch-vcs via environment
          export HATCH_BUILD_HOOK_ENABLE_VCS=true
          
          echo "Building core package with version $TAG_VERSION..."
          uv build
          
          # Verify the built version
          WHEEL_FILE=$(ls dist/*.whl | head -n 1)
          echo "Built wheel: $WHEEL_FILE"
          if [[ "$WHEEL_FILE" == *"0.0.0.dev0"* ]]; then
            echo "❌ ERROR: Built package still has fallback version!"
            echo "Wheel filename: $WHEEL_FILE"
            exit 1
          fi
          
          echo "✅ Core package built successfully with correct version"
      
      - name: Build docling-serve package
        run: |
          cd packages/docling_serve
          
          # Set version explicitly for hatch-vcs via environment
          export HATCH_BUILD_HOOK_ENABLE_VCS=true
          
          echo "Building docling-serve package with version $TAG_VERSION..."
          uv build
          
          # Verify the built version
          WHEEL_FILE=$(ls dist/*.whl | head -n 1)
          echo "Built wheel: $WHEEL_FILE"
          if [[ "$WHEEL_FILE" == *"0.0.0.dev0"* ]]; then
            echo "❌ ERROR: Built package still has fallback version!"
            echo "Wheel filename: $WHEEL_FILE"
            exit 1
          fi
          
          echo "✅ Docling-serve package built successfully with correct version"
      # Not implemented yet.
      #- name: Build local package
      #  run: |
      #    cd packages/local
      #    uv build
      
      - name: Publish core package to PyPI
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: |
          cd packages/core
          uv publish
      
      - name: Publish docling-serve package to PyPI
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: |
          cd packages/docling_serve
          uv publish
      # Not implemented yet.
      #- name: Publish local package to PyPI
      #  env:
      #    UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
      #  run: |
      #    cd packages/local
      #    uv publish
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.determine_tag.outputs.tag }}
          files: |
            packages/core/dist/*
            packages/docling_serve/dist/*
#            Not implemented yet.
#            packages/local/dist/*
          generate_release_notes: true
          draft: false
          prerelease: false
      
      - name: Comment on PR (if triggered by PR)
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const tag = '${{ steps.determine_tag.outputs.tag }}';
            const bumpType = '${{ needs.create-tag.outputs.bump_type }}';
            
            try {
              await github.rest.issues.createComment({
                issue_number: context.payload.pull_request.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `🚀 **Release ${tag}** published successfully!\n\n- Packages published to PyPI\n- GitHub Release created`
              });
            } catch (error) {
              // PR is already closed/merged, so we can't comment
              // This is expected behavior - log but don't fail
              console.log('Could not comment on PR (likely already closed):', error.message);
            }

