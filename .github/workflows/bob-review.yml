name: 🤖 Bob Review

on:
  pull_request_target:
    branches:
      - main
      - dev

jobs:
  review:
    name: Bob reviews this PR
    # Skip draft PRs and bot-authored PRs to avoid loops
    if: >
      github.event.pull_request.draft == false &&
      !endsWith(github.event.pull_request.user.login, '[bot]')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: production
    permissions:
      pull-requests: write
      contents: read
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Bob Shell
        run: curl -fsSL https://bob.ibm.com/download/bobshell.sh | bash -s -- --pm npm

      - name: Fetch PR diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr diff ${{ github.event.pull_request.number }} > pr.diff

      - name: Run Bob Shell review and post
        env:
          BOBSHELL_API_KEY: ${{ secrets.BOBSHELL_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bob --accept-license --auth-method api-key --yolo --chat-mode advanced -p "$(cat <<'EOF'
          You are reviewing a pull request on the ${{ github.repository }} repo, non-interactively, in CI.
          Read AGENTS.md first to understand this repo's patterns and constraints.
          The PR diff is in the file pr.diff. Read it using the read_file tool with file_path="pr.diff".

          Your goal is to post a GitHub pull request review with inline code comments using the gh CLI.

          ## Step 1 — Analyse
          Read the diff carefully. For each finding, note the exact file path and line number in the new file (RIGHT side of the diff).

          ## Step 2 — Post inline comments
          For every finding, post an inline review comment anchored to the exact file and line using the GitHub API:

            gh api --method POST \
              /repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/comments \
              -f commit_id="${{ github.event.pull_request.head.sha }}" \
              -f path="<file>" \
              -F line=<line> \
              -f side="RIGHT" \
              -f body="<your finding in Markdown>"

          Use -F (capital F) for the integer line field and -f (lowercase f) for all string fields.
          For a multi-line comment, also pass -F start_line=<first_line> (must be less than line).
          Post one command per finding. Only post comments for real issues — do not invent issues.

          ## Step 3 — Submit the overall review
          After posting all inline comments, submit the review verdict with a short top-level summary:

          If there are no blockers:
            gh pr review ${{ github.event.pull_request.number }} \
              --approve \
              --body "## 🤖 Bob's Review
          *Posted by [Bob Shell](https://bob.ibm.com), IBM's CLI agent — running headless on GitHub Actions.*

          ---
          <1-2 sentence summary of the changes and overall verdict>"

          If there are blockers:
            gh pr review ${{ github.event.pull_request.number }} \
              --request-changes \
              --body "## 🤖 Bob's Review
          *Posted by IBM Bob — running headless on GitHub Actions.*

          ---
          <1-2 sentence summary and explanation of what must be fixed>"

          ## Rules
          - Do not write any files to disk.
          - Do not modify any source files.
          - Do not run the test suite.
          - Be specific. Do not restate what the diff already shows.
          - Only use findings that are backed by the diff — do not invent issues.
          EOF
          )"