name: 🤖 Bob Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
      - dev

jobs:
  review:
    name: Bob reviews this PR
    # Skip draft PRs and bot-authored PRs to avoid loops
    if: >
      github.event.pull_request.draft == false &&
      !endsWith(github.event.pull_request.user.login, '[bot]')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: production
    permissions:
      pull-requests: write
      contents: read
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history for gh pr diff to resolve merge base

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Bob Shell
        run: curl -fsSL https://bob.ibm.com/download/bobshell.sh | bash -s -- --pm npm

      - name: Fetch PR diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr diff ${{ github.event.pull_request.number }} > pr.diff

      - name: Run Bob Shell review and create comment
        env:
          BOBSHELL_API_KEY: ${{ secrets.BOBSHELL_API_KEY }}
        run: |
          bob --accept-license --auth-method api-key --approval-mode auto_edit -p "$(cat <<'EOF'
          You are reviewing a pull request on the ${{ github.repository }} repo, non-interactively, in CI.
          Read AGENTS.md first to understand this repo's patterns and constraints.
          The PR diff is in the file pr.diff. Read it using the read_file tool with file_path="pr.diff".

          Then use the write_to_file tool to create a file named "review.md" with your complete code review in valid Markdown format.

          The review.md file must contain:
          - A header: "## 🤖 Bob's Review"
          - A subtitle: "*Posted by [Bob Shell](https://bob.ibm.com), IBM's CLI agent — running headless on GitHub Actions.*"
          - A horizontal rule: "---"
          - A 1-2 sentence summary of the changes.
          - A "## Findings" section with the issues you'd raise, each with a file:line reference and a short suggestion. Group by severity (### Blockers / ### Nits / ### Questions).
          - If the diff looks fine, say so plainly under "## Findings" with "No issues found." Do not invent issues.
          - Be specific. Do not restate what the diff already shows.
          - Do not approve or block the PR — you are leaving a comment, not a verdict.

          The entire review must be valid Markdown. Do not include any markers or delimiters.
          Do not modify any source files. Do not run the test suite.
          EOF
          )"

      - name: Post review comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr review ${{ github.event.pull_request.number }} --comment --body-file review.md