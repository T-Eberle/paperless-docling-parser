[build-system]
requires = ["hatchling>=1.24"]
build-backend = "hatchling.build"

[project]
name = "pgx-docling-parser-serve"
version = "0.0.0"
description = "Docling-serve remote converter for pgx-docling-parser"
readme = "README.md"
requires-python = ">=3.10,<3.14"
license = "MIT"
authors = [
  { name = "T-Eberle" },
]

# Dependencies specific to docling_serve (remote API client)
dependencies = [
    "pgx-docling-parser-core",
    "httpx>=0.27.0",
    "tenacity>=8.2.0",
]

[project.entry-points."paperless_ngx.parsers"]
docling = "pgx_docling_serve.parsers:DoclingRemoteParser"

[tool.uv.sources]
pgx-docling-parser-core = { path = "../core", editable = true }

[tool.hatch.build.targets.wheel]
packages = ["src/pgx_docling_serve"]

[tool.hatch.build.targets.sdist]
include = [
    "src/",
]