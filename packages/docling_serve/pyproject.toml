[build-system]
requires = ["hatchling>=1.24", "hatch-vcs>=0.3.0"]
build-backend = "hatchling.build"

[tool.hatch.version]
source = "vcs"
root = "../.."
fallback-version = "0.0.0.dev0"

[project]
name = "paperless-docling-parser-docling-serve"
dynamic = ["version"]
description = "Docling-serve remote converter for paperless-docling-parser"
readme = "README.md"
requires-python = ">=3.10,<3.14"
license = "MIT"
authors = [
  { name = "T-Eberle" },
]

# Dependencies specific to docling_serve (remote API client)
dependencies = [
    "paperless-docling-parser-core",
    "httpx>=0.27.0",
    "tenacity>=8.2.0",
]

[tool.uv.sources]
paperless-docling-parser-core = { path = "../core", editable = true }

[tool.hatch.build.targets.wheel]
packages = ["src/docling_serve"]

[tool.hatch.build.targets.sdist]
include = [
    "src/",
]