[build-system]
requires = ["hatchling>=1.24", "hatch-vcs>=0.3.0"]
build-backend = "hatchling.build"

[tool.hatch.version]
source = "vcs"
root = "../.."
fallback-version = "0.0.0.dev0"

[project]
name = "pgx-docling-parser-local"
dynamic = ["version"]
description = "Local converter for pgx-docling-parser (for local development)"
readme = "README.md"
requires-python = ">=3.10,<3.14"
license = "MIT"
authors = [
  { name = "T-Eberle" },
]

# Dependencies specific to local converter
# TODO: Add docling and other local processing dependencies when implemented
dependencies = [
    "pgx-docling-parser-core",
]

[tool.hatch.build.targets.wheel]
packages = ["src/local"]